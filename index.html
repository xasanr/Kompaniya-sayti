
<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Premium Red Platform</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#0b0b0b;color:#fff}

header{
height:100vh;
background:linear-gradient(135deg,#7a0000,#ff0000);
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:20px
}

h1{font-size:3.2rem;animation:zoomIn 1.5s}
p{margin-top:15px;font-size:1.2rem;opacity:.9}

.btn{
margin-top:30px;
display:inline-block;
padding:15px 45px;
background:#fff;
color:#b00000;
font-weight:bold;
border-radius:50px;
text-decoration:none;
transition:.3s
}
.btn:hover{transform:scale(1.1)}

section{padding:80px 20px;max-width:1200px;margin:auto}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px
}

.card{
background:#161616;
padding:30px;
border-radius:20px;
border:1px solid red;
opacity:0;
transform:translateY(60px);
transition:.7s
}
.card.show{opacity:1;transform:none}
.card:hover{transform:scale(1.05)}

.counter{
font-size:3rem;
color:#ff4d4d;
margin-top:15px
}

.pricing{
margin-top:80px;
background:linear-gradient(135deg,#ff0000,#700000);
padding:50px;
border-radius:30px;
text-align:center;
animation:pulse 3s infinite
}

/* ADMIN */
#admin{
display:none;
background:#000;
padding:40px;
border-radius:20px;
margin-top:60px
}
input{
width:100%;
padding:15px;
margin:10px 0;
border:none;
border-radius:10px
}
button{
padding:15px;
width:100%;
background:red;
color:#fff;
border:none;
border-radius:10px;
font-weight:bold
}

footer{
text-align:center;
padding:30px;
color:#aaa;
font-size:14px
}

@keyframes zoomIn{
from{opacity:0;transform:scale(.6)}
to{opacity:1;transform:scale(1)}
}
@keyframes pulse{
0%{box-shadow:0 0 0 0 rgba(255,0,0,.7)}
70%{box-shadow:0 0 0 30px rgba(255,0,0,0)}
100%{box-shadow:0 0 0 0 rgba(255,0,0,0)}
}
</style>
</head>

<body>

<header>
<div>
<h1>🔥 Premium Red SaaS</h1>
<p>Investorlar va startuplar uchun yuqori darajadagi platforma</p>
<a href="#features" class="btn">Ko‘rish</a>
</div>
</header>

<section id="features">
<h2 style="text-align:center;margin-bottom:40px">Nega bu loyiha qimmat?</h2>

<div class="cards">
<div class="card">
<h3>⚡ Tezlik</h3>
<p>Vanilla JS – universal</p>
<div class="counter" data-target="100">0</div>
</div>

<div class="card">
<h3>👥 Foydalanuvchilar</h3>
<p>Masshtablashga tayyor</p>
<div class="counter" data-target="5000">0</div>
</div>

<div class="card">
<h3>💰 Qiymat</h3>
<p>Sotuv potensiali</p>
<div class="counter" data-target="10000">0</div>
</div>
</div>

<div class="pricing">
<h2>Potensial baho</h2>
<p style="font-size:32px">$10,000+</p>
</div>

<!-- ADMIN PANEL -->
<div id="admin">
<h2>🔐 Admin Panel</h2>
<input type="password" id="pass" placeholder="Admin parol">
<button onclick="login()">Kirish</button>
<p id="status"></p>
</div>

</section>

<footer>
© 2026 Premium Red Platform
</footer>

<script>
// scroll animatsiya
var cards=document.querySelectorAll('.card');
function show(){
var h=window.innerHeight*0.85;
for(var i=0;i<cards.length;i++){
if(cards[i].getBoundingClientRect().top<h){
cards[i].classList.add('show');
}
}
}
window.addEventListener('scroll',show);show();

// counter animatsiya
var counters=document.querySelectorAll('.counter');
for(var i=0;i<counters.length;i++){
(function(el){
var target=+el.dataset.target;
var c=0;
var interval=setInterval(function(){
c+=Math.ceil(target/100);
if(c>=target){c=target;clearInterval(interval)}
el.innerText=c;
},40);
})(counters[i]);
}

// admin panel
function login(){
var pass=document.getElementById('pass').value;
if(pass==="admin123"){
document.getElementById('status').innerText="✅ Kirildi";
document.getElementById('status').style.color="lightgreen";
localStorage.setItem("admin","true");
}else{
document.getElementById('status').innerText="❌ Xato parol";
document.getElementById('status').style.color="red";
}
}
if(localStorage.getItem("admin")){
document.getElementById('admin').style.display="block";
}
</script>
</body>
</html>
